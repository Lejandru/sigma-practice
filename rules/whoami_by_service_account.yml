title: Whoami Execution by Service Account
id: 5c1fc933-1600-45f8-94b0-503e267afdd6
status: experimental
description: |
  whoami.exe running under a service account is a red flag. Services don't
  run whoami on their own. Usually it shows up right after someone gets a
  shell on a host and is checking what account they landed in.
references:
  - https://attack.mitre.org/techniques/T1033/
author: Lee
date: 2026-04-29
tags:
  - attack.discovery
  - attack.t1033
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith: '\whoami.exe'
  selection_user:
    User|contains: 'svc_'
  condition: selection_image and selection_user
falsepositives:
  - Service accounts that don't start with svc_. Change the User filter to match how your environment names them.
  - Some service scripts run whoami at startup to log the account they're under. Those will trigger this.
level: medium
