title: PowerShell Encoded Command Execution
id: 6b68d1dd-f2a2-4354-90fa-872d1841a9a3
status: experimental
description: |
  -EncodedCommand and -enc tell PowerShell the command is base64. Attackers
  use it to hide what they're actually running so log reviewers and signature
  rules miss the payload. Almost every intrusion writeup I've read has one
  of these in the chain.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
author: Lee
date: 2026-04-29
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_flag:
    CommandLine|contains:
      - '-encodedcommand'
      - ' -enc '
  condition: selection_image and selection_flag
falsepositives:
  - SCCM and some backup products run encoded PowerShell as part of normal operation. They'll trip this.
  - Internal scripts for remote management or diagnostics sometimes use -enc legitimately.
level: high
